name: Build & Release

# Triggers whenever you push a version tag like: git tag v1.0.1 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Download Bible JSON files if they aren't already committed to the repo.
      # safe to fail — the step is skipped if all bibles are already present.
      - name: Download Bible data
        run: node scripts/download-bibles.js
        continue-on-error: true

      # Download the NDI SDK and compile grandiose against the packaged Electron version.
      # NDI is optional — if the SDK download or compile fails the build still succeeds
      # and the app ships without NDI (shows "grandiose not installed" in Settings).
      - name: Install NDI SDK and compile grandiose
        shell: powershell
        continue-on-error: true
        run: |
          Write-Host "Downloading NDI SDK..."
          $sdkUrl = "https://downloads.ndi.tv/SDK/NDI_SDK/NDI_SDK_v6_Windows.exe"
          $installer = "$env:TEMP\NDI_SDK.exe"
          Invoke-WebRequest -Uri $sdkUrl -OutFile $installer -UseBasicParsing
          Write-Host "Installing NDI SDK silently..."
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait
          Write-Host "Compiling grandiose against Electron..."
          npx @electron/rebuild -f -w grandiose
          Write-Host "grandiose compiled successfully — NDI enabled in build."

      # 1. vite build  → dist/
      # 2. tsc (electron)  → dist-electron/
      - name: Build renderer + main process
        run: npm run electron:build

      # electron-builder reads GH_TOKEN to create the release and upload the
      # installer.  GITHUB_TOKEN is automatically provided by Actions — no
      # manual secret setup needed.
      - name: Package and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
