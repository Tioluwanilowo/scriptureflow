name: Build & Release

# Triggers whenever you push a version tag like: git tag v1.0.1 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation warning

    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # --ignore-scripts prevents grandiose from running node-gyp at install time.
      # The NDI SDK is not present yet, so native compilation would fail here.
      # grandiose is compiled properly in the NDI step below once the SDK is ready.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Download Bible JSON files if they aren't already committed to the repo.
      # safe to fail — the step is skipped if all bibles are already present.
      - name: Download Bible data
        run: node scripts/download-bibles.js
        continue-on-error: true

      # grandiose v0.0.4 passes string literals to char* parameters — modern
      # MSVC rejects this throughout the codebase. The simplest fix is to add
      # /Zc:strictStrings- to binding.gyp so MSVC allows it for this module only.
      - name: Patch grandiose binding.gyp for MSVC compatibility
        shell: powershell
        run: |
          $gyp = "node_modules/grandiose/binding.gyp"
          $t = [IO.File]::ReadAllText($gyp)
          $t = $t.Replace('"target_name": "grandiose"', '"target_name": "grandiose", "msvs_settings": { "VCCLCompilerTool": { "AdditionalOptions": ["/Zc:strictStrings-"] } }')
          [IO.File]::WriteAllText($gyp, $t)
          Write-Host "Patched binding.gyp"

      # Compile grandiose against the packaged Electron version.
      # grandiose bundles the NDI SDK headers inside the npm package (lib/ndi/),
      # so no separate NDI SDK download is needed — just rebuild for Electron.
      # NDI is optional — if this step fails the app ships without NDI support.
      - name: Compile grandiose for Electron
        continue-on-error: true
        run: npx @electron/rebuild -f -w grandiose

      # grandiose v0.0.4 bundles a stale NDI v3.5.9 DLL (from 2018).
      # NDI v3 uses an old discovery protocol that NDI v5/v6 receivers
      # (OBS NDI plugin, NDI Tools 6, vMix) cannot see. Removing these
      # DLLs forces Windows to load the user's system NDI v5/v6 runtime
      # instead — which uses the modern mDNS-based discovery protocol.
      # main.ts injects the NDI 6 Tools runtime path into PATH before
      # requiring grandiose, so the v6 DLL is found via PATH lookup.
      - name: Remove bundled NDI v3 DLLs (force NDI v5+ runtime)
        shell: powershell
        run: |
          Remove-Item "node_modules/grandiose/build/Release/Processing.NDI.Lib.x64.dll" -ErrorAction SilentlyContinue
          Remove-Item "node_modules/grandiose/lib/win_x64/Processing.NDI.Lib.x64.dll" -ErrorAction SilentlyContinue
          Write-Host "Removed bundled NDI v3 DLLs - app will use system NDI v5/v6 runtime"

      # 1. vite build  → dist/
      # 2. tsc (electron)  → dist-electron/
      - name: Build renderer + main process
        run: npm run electron:build

      # electron-builder reads GH_TOKEN to create the release and upload the
      # installer.  GITHUB_TOKEN is automatically provided by Actions — no
      # manual secret setup needed.
      - name: Package and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
